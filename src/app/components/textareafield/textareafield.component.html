<ion-row id="open-modal" expand="block">
    <ion-col (click)="openModal()">
        <div class="newdiv" [class.input-error]="isInvalid" [style]="description?'padding: 5px 15px;':''">
          @if(!description){
           <ion-item>Objektbeschreibung <span class="requiedcls">*</span></ion-item>
         }
         @else {
          <ion-label style="color: black;font-size: 15px;font-weight: 700;">Allgemeine Objektbeschreibung:</ion-label>
          <p style="white-space: break-spaces;" class="m0">{{description}}</p>
         }
      </div>
    
    </ion-col>
</ion-row>

<ion-modal #modal>
        <ng-template>
            <ion-header >
        <ion-toolbar color="primary">
          <ion-buttons slot="primary" (click)="goback();">
            <ion-icon name="close" style="font-size: 25px;color: #ffff;;
            margin-right: 15px;"></ion-icon>
          </ion-buttons>
          <ion-title>Objektbeschreibung</ion-title>
        </ion-toolbar>
      </ion-header>

        <ion-content>
            <ion-row>
              <ion-col size="12">
                <ion-title class="titlecls">ALLGEMEINE OBJEKTBESCHREIBUNG</ion-title>
                <ion-textarea rows="10" cols="20" class="text-des" autocapitalize='true' [(ngModel)]="description"></ion-textarea>
              </ion-col>
              <ion-col style="text-align: center;">
                <ion-button color="secondary" type="submit" (click)="getdescription()">Weiter</ion-button>
              </ion-col>
            </ion-row>
        </ion-content>

    </ng-template>
  </ion-modal>
