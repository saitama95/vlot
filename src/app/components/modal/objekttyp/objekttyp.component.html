<ion-header >
  <ion-toolbar color="primary">
    <ion-buttons slot="primary" (click)="goback();">
      <ion-icon name="close" style="font-size: 25px;color: #ffff;;
      margin-right: 15px;"></ion-icon>
    </ion-buttons>
    <ion-title>Objekttyp</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content>
  <ion-list>
    <ion-radio-group allow-empty-selection="true" name="radio-group" value="{{data}}"  (ionChange)="radioGroupChange($event)" #radioGroup>
      @for (item of arrdata; track $index) {
        <ion-item>
          <ion-label>{{item.name}}</ion-label>
          <ion-radio slot="end" name="radiobtn" value="{{item.name}}"></ion-radio>
        </ion-item>
      }
    </ion-radio-group>
  </ion-list>
</ion-content>
