<ion-row (click)="openModal()">
  <ion-col size="12">
    <div class="newdiv" [class.input-error]="isInValid">
      <ion-item button detail="false" class="item_form">
        <ion-label>
          <p class="title_label" [class.fw]="displayValue">{{ label }}</p>
           @if(displayValue){
          <div class="valuechec">
            <span>
            {{ displayValue }}  
            </span>
          </div>
          }
        </ion-label>
      </ion-item>
    </div>
  </ion-col>
</ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>{{ label }}</ion-title>
        <ion-buttons slot="primary" (click)="goback()">
          <ion-icon name="close" style="font-size:25px; color:#fff; margin-right:15px;"></ion-icon>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      @for (item of arrdata; track $index) {
        <ion-item>
          <ion-label>{{ item.name }}</ion-label>
          <ion-checkbox
            color="primary"
            slot="end"
            [checked]="isChecked(item.name)"
            (ionChange)="toggleItem(item.name, $event.detail.checked)"> 
          </ion-checkbox>
        </ion-item>
      }

      <ion-row>
        <ion-col style="text-align:center;">
          <ion-button color="primary" (click)="SaveDatas()">Weiter</ion-button>
        </ion-col>
      </ion-row>
    </ion-content>

  </ng-template>
</ion-modal>
