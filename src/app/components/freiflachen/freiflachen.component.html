<ion-row>
  <ion-col (click)="openModal()">
    <div class="newdiv display-value">
      <ion-item>
        <ion-label>
          <p class="title_label" [class.fw]="displayValue">{{ label }}</p>
          @if(displayValue) {
            <div class="valuechec">
              @for(part of displayParts; track $index) {
                @if($index > 0) {<span>, </span>}
                <span>
                  {{ part.label }}
                  @if(part.val) {
                    : {{ part.val }} m<sup>2</sup>
                  }
                </span>
              }
            </div>
          }
        </ion-label>
      </ion-item>
    </div>
  </ion-col>
</ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-buttons slot="primary" (click)="goback()">
          <ion-icon name="close" class="close-icon"></ion-icon>
        </ion-buttons>
        <ion-title>{{label}}</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <form [formGroup]="FreiflachenForm" (ngSubmit)="submitData()">
       @for (field of fields; track $index) {
        <ion-row class="field-row">
          <ion-col size="12">
            <div class="divclass greybackground">
              <ion-label>{{ field.label }}</ion-label>
              <ion-checkbox
                color="primary"
                class="checkbox-right"
                [formControlName]="field.checkControl"
                [checked]="checkedState[field.key]"
                (ionChange)="onCheckChange($event, field.key)">
              </ion-checkbox>
            </div>
          </ion-col>
          <ion-col size="10">
            <div class="input-wrapper">
              <ion-input
                placeholder="Größe (optional)"
                type="number"
                [formControlName]="field.valControl"
                (click)="onInputClick(field.key)">
              </ion-input>
            </div>
          </ion-col>
          <ion-col size="2">
            <div class="labelnew">
              <ion-label class="unit-label">m<sup>2</sup></ion-label>
            </div>
          </ion-col>
        </ion-row>
      }
        <ion-row>
          <ion-col class="submit-col">
            <ion-button color="secondary" type="submit">Weiter</ion-button>
          </ion-col>
        </ion-row>

      </form>
    </ion-content>
  </ng-template>
</ion-modal>
