<ion-row>
  <ion-col (click)="openModal()">
    <div class="newdiv">
      <ion-item>
        <ion-label>{{ label }}</ion-label>
        <ion-note slot="end" style="color: black; font-size: 14px; font-weight: 500;">
          {{ displayValue }}
        </ion-note>
      </ion-item>
    </div>
  </ion-col>
</ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-buttons slot="primary" (click)="goback()">
          <ion-icon name="close" style="font-size: 25px; color: #fff; margin-right: 15px;"></ion-icon>
        </ion-buttons>
        <ion-title>Verfügbarkeit</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
        <ion-list>
          <ion-radio-group allow-empty-selection="true" [value]="availability_modal" (ionChange)="radioGroupChange($event)">
        <ion-item>
          <ion-label>sofort</ion-label>
          <ion-radio slot="end" value="sofort"></ion-radio>
        </ion-item>
        <ion-item>
          <ion-label>nach Vereinbarung</ion-label>
          <ion-radio slot="end" value="nach Vereinbarung"></ion-radio>
        </ion-item>
      </ion-radio-group>
        <ion-item>
          <ion-label>ab Datum</ion-label>
          <ion-datetime-button datetime="date-picker" style="margin-right: 10px;"></ion-datetime-button>
          <ion-modal [keepContentsMounted]="true" #dateModal >
            <ng-template>
              <ion-datetime
                id="date-picker"
                presentation="date"
                (ionChange)="onDateChange($event)">
              </ion-datetime>
            </ng-template>
          </ion-modal>
          <a (click)="getValue()" class="subcls">OK</a>
        </ion-item>
      </ion-list>
    </ion-content>
  </ng-template>
</ion-modal>
