<ion-row [formGroup]="form">
  <ion-col size="4">
    @if(pincode?.value === '') {
      <span class="requiedcls3">*</span>
    }
    <ion-input
      type="number"
      placeholder="PLZ"
      class="myinputname"
      formControlName="pincode"
      (ionInput)="getPincode()"
      [class.input-error]="pincode?.invalid && pincode?.touched">
    </ion-input>
  </ion-col>

  <ion-col size="8">
    <ion-item class="item_form" [class.input-error-native]="city?.invalid && city?.touched">
      <ion-select interface="popover" formControlName="city">
        @if(cityList.length){
           @for (item of cityList; track $index) {
           <ion-select-option [value]="item.city_name">{{item.city_name}}</ion-select-option>
         }
        }
      </ion-select>
    </ion-item>
  </ion-col>

  <ion-col size="12">
    <div class="statediv">
      <span>{{ statename?.value }}</span>
    </div>
  </ion-col>
</ion-row>
