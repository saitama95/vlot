 <ion-row>
    <ion-col  (click)="openModal()">
      @if(lageModal || sonstigesModal){
        <div class="newdiv" style="padding: 5px 10px 5px 10px;">
          @if(lageModal){
              <div class="mb-2">
                 <ion-label style="color: black;font-size: 15px;font-weight: 700;">Lage</ion-label>
                <p style="white-space: break-spaces;" class="m0">{{lageModal }}</p>
              </div>
          }
          @if(sonstigesModal){
            <div class="mb-2">
              <ion-label style="color: black;font-size: 15px;font-weight: 700;">Sonstiges</ion-label>
              <p style="white-space: break-spaces;" class="m0">{{sonstigesModal}}</p>
            </div>
          }
        </div>
      }@else{
      <div class="newdiv">
        <a>
          <ion-item class="item_form">{{label}}</ion-item>
        </a>
      </div>
      }
    </ion-col>
</ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header >
      <ion-toolbar color="primary">
        <ion-buttons slot="primary" (click)="goback();">
          <ion-icon name="close" style="font-size: 25px;color: #ffff;;
          margin-right: 15px;"></ion-icon>
        </ion-buttons>
        <ion-title>{{label}}</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <form [formGroup]="LageReactiveFrom" (ngSubmit)="getFormValue();">
        <ion-row>
          <ion-col>
            <ion-title class="titlecls">LAGE</ion-title>
            <ion-textarea rows="6" cols="20" class="text-des" autocapitalize='true' formControlName="lage" 
            placeholder="z.B. Informationen zu Umgebung, Infrastruktur, Anbindung ans offentliche Verkehrsnetz,........"></ion-textarea>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-title class="titlecls">SONSTIGES</ion-title>
            <ion-textarea rows="6" cols="20" class="text-des" autocapitalize='true' formControlName="sonstiges"></ion-textarea>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col style="text-align: center;">
            <ion-button color="secondary" type="submit">Weiter</ion-button>
          </ion-col>
        </ion-row>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
