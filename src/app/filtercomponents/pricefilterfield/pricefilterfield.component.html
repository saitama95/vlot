 <ion-row>
    <ion-col>
      <div class="newdiv" *ngIf="!this.RentHausPriceData; else pricediv">
        <a (click)="openModal()">
          <ion-item><ion-label>Preis</ion-label></ion-item>
        </a>
      </div>
      <ng-template #pricediv>
        <div class="newdiv" style="padding: 7px;">
          <a (click)="openModal()">
            <ion-label style="color: black;font-size: 15px; font-weight: 700;">Preis: </ion-label>
            <p style="font-size: 15px;font-weight: 600;color: #ff4700;margin-top: 5px;">{{RentHausPriceData}}</p>
          </a>
          <a (click)="cutprice()">
            <ion-icon name="close" class="closebtn">
            </ion-icon>
          </a>
        </div>
      </ng-template>
    </ion-col>
  </ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header>
  <ion-toolbar color="primary">
    <a (click)="goback();"  style="float: left;"> <img style="margin-left: 10px;" src="assets/image/left-arrow2.png"></a>
    <ion-title style="text-align: center;">Preis</ion-title>
  
  </ion-toolbar>
</ion-header>


<ion-content>
  @if(showtoggle){
     <ion-row>
    <ion-col class="toggle_cont">

      <div>
        <ion-label>Nur zu verschenken</ion-label>
        <label class="custom-toggle">
          <input id="togglebtn" type="checkbox" (click)="changeState($event)">
          <span class="slider"></span>
          <p class="toggle_status" id="toggletext">{{toggleStatus}}</p>
      </label>
      </div>
    </ion-col>
  </ion-row>

  }
 

  <ion-row>
    <ion-col size="6">
      <ion-label class="col-head">von</ion-label>
    </ion-col>
    <ion-col size="6">
      <ion-label class="col-head">bis</ion-label>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
       
        <ion-input type="text" (keyup)="getinput1($event,'vonPrice1');" inputmode="numeric" value="{{tempPrice1}}" placeholder="{{tempPrice1placeholder}}" id="vonPrice1" [(ngModel)]="Pries1"></ion-input>
        
      </ion-item>
    </ion-col>

    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
        <ion-input type="text" (keyup)="getinput2($event,'bisPrice1');" inputmode="numeric" placeholder="{{priceplaceholder}}" value="{{tempPrice2}}" id="bisPrice1" [(ngModel)]="Pries2"></ion-input>

       
      </ion-item>
    </ion-col>
  </ion-row>

  <ion-row style="padding-top: 5px;">
    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
        <ion-select interface="popover" (ionChange)="getPriceDataRange1($event.detail.value);" value="{{selectprice1}}" [(ngModel)]="Pries1">
          <ion-select-option value="{{pricerange1.value}}" *ngFor="let pricerange1 of getpricerange1">{{pricerange1.range1}}</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-col>

    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
        <ion-select interface="popover" (ionChange) = "getPriceDataRange2($event.detail.value);" value="{{selectprice2}}"  [(ngModel)]="Pries2">
          <ion-select-option value="{{pricerange2.value}}" *ngFor="let pricerange2 of getpricerange2"  >{{pricerange2.range2}}</ion-select-option>
        </ion-select>
      </ion-item>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col size="12" style="text-align: center;">
      <ion-button color="primary" (click)="postFilterData();">Weiter</ion-button>
    </ion-col>
  </ion-row>
</ion-content>

   </ng-template>
</ion-modal>
