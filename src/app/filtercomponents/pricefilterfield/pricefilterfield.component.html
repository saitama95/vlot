 <ion-row>
    <ion-col>
      @if(!displayPriceRange ){
        <div class="newdiv" (click)="openModal()">
          <ion-item><ion-label>Preis</ion-label></ion-item>
      </div>
      }@else{
         <div class="newdiv" style="padding: 7px;">
          <a (click)="openModal()">
            <ion-label style="color: black;font-size: 15px; font-weight: 700;">Preis: </ion-label>
            <p style="font-size: 15px;font-weight: 600;color: #ff4700;margin-top: 5px;">{{displayPriceRange }}</p>
          </a>
            <ion-icon name="close" class="closebtn" (click)="cutprice()">
            </ion-icon>
        </div>
      }
    </ion-col>
  </ion-row>

<ion-modal #modal>
  <ng-template>
    <ion-header>
  <ion-toolbar color="primary">
    <a (click)="goback();"  style="float: left;"> 
      <img style="margin-left: 10px;" src="assets/image/left-arrow2.png">
    </a>
    <ion-title style="text-align: center;">Preis</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content>
  @if(showtoggle){
     <ion-row>
    <ion-col class="toggle_cont">

      <div>
        <ion-label>Nur zu verschenken</ion-label>
        <label class="custom-toggle">
          <input id="togglebtn" type="checkbox" (click)="changeState($event)">
          <span class="slider"></span>
          <p class="toggle_status" id="toggletext">{{toggleStatus}}</p>
      </label>
      </div>
    </ion-col>
  </ion-row>

  }
 

  <ion-row>
    <ion-col size="6">
      <ion-label class="col-head">von</ion-label>
    </ion-col>
    <ion-col size="6">
      <ion-label class="col-head">bis</ion-label>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
       
          <ion-input
            type="text"
            inputmode="numeric"
            [(ngModel)]="tempPrice1"
            [placeholder]="tempPrice1placeholder"
            (ionChange)="getinput1($event)">
          </ion-input>
        
      </ion-item>
    </ion-col>

    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
          <ion-input
            type="text"
            inputmode="numeric"
            [(ngModel)]="tempPrice2"
            [placeholder]="priceplaceholder"
            (ionChange)="getinput2($event)">
          </ion-input>
      </ion-item>
    </ion-col>
  </ion-row>

  <ion-row style="padding-top: 5px;">
    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
       <ion-select
          interface="popover"
          [(ngModel)]="selectprice1"
          (ionChange)="getPriceDataRange1($event.detail.value)">
          @for (item of getpricerange1; track $index) {
            <ion-select-option value="{{item.value}}">{{item.range1}}</ion-select-option>
          }
          </ion-select>
      </ion-item>
    </ion-col>

    <ion-col size="6" class="mycol">
      <ion-item style="height: 39px;">
        <ion-select
            interface="popover"
            [(ngModel)]="selectprice2"
            (ionChange)="getPriceDataRange2($event.detail.value)">
            @for (item of getpricerange2; track $index) {
              <ion-select-option value="{{item.value}}">{{item.range2}}</ion-select-option>
            }
          </ion-select>
      </ion-item>
    </ion-col>
  </ion-row>

  <ion-row>
    <ion-col size="12" style="text-align: center;">
      <ion-button color="primary" (click)="postFilterData();">Weiter</ion-button>
    </ion-col>
  </ion-row>
</ion-content>

   </ng-template>
</ion-modal>
